services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: ahedna-postgres
    profiles:
      - local-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ahedna_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ahedna-network

  # Backend Fastify
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: ahedna-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - ahedna-network
    command: sh -c "yarn install && yarn dev"
    restart: unless-stopped

  # Frontend Angular
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: ahedna-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.angular
    depends_on:
      - backend
    environment:
      AHEDNA_API_URL: ${AHEDNA_API_URL:-/api}
    networks:
      - ahedna-network
    command: sh -c "yarn install && yarn start:docker"
    restart: unless-stopped

networks:
  ahedna-network:
    driver: bridge

volumes:
  postgres_data:
